name: Auto Obfuscate

on:
  push:
    branches:
      - main
  schedule:
    - cron: "10 3,12,16 * * *"
  workflow_dispatch: 

env:
  REPO: "odaychina/edge"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v7

      - name: Check for Updates
        id: check_update
        run: |
          # 1. 获取远程最新 commit SHA
          REMOTE_SHA=$(curl -s "https://api.github.com/repos/${{ env.REPO }}/commits?per_page=1" | jq -r '.[0].sha')
          if [ "$REMOTE_SHA" = "null" ] || [ -z "$REMOTE_SHA" ]; then
            echo "⚠️ Failed to fetch remote SHA"
            echo "UPDATE_NEEDED=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          # 2. 读取上次同步记录的 SHA
          LOCAL_SHA=""
          [ -f ".sync_sha" ] && LOCAL_SHA=$(cat .sync_sha)
          echo "Remote SHA: ${REMOTE_SHA:0:7} | Local SHA: ${LOCAL_SHA:0:7}"
          # 3. 比较
          if [ "$REMOTE_SHA" = "$LOCAL_SHA" ]; then
            echo "✅ Already up to date"
            echo "UPDATE_NEEDED=false" >> $GITHUB_OUTPUT
          else
            echo "🔄 Update available"
            echo "UPDATE_NEEDED=true" >> $GITHUB_OUTPUT
            echo "NEW_SHA=$REMOTE_SHA" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node.js
        if: steps.check_update.outputs.UPDATE_NEEDED == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install obfuscator
        if: steps.check_update.outputs.UPDATE_NEEDED == 'true' || github.event_name == 'workflow_dispatch'
        run: npm install -g javascript-obfuscator

      - name: Obfuscate JS
        if: steps.check_update.outputs.UPDATE_NEEDED == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          wget -O origin.js https://raw.githubusercontent.com/$REPO/main/_worker.js
          javascript-obfuscator origin.js --output _worker.js \
          --compact true \
          --string-array true \
          --string-array-encoding 'base64' \
          --string-array-threshold 0.75 \
          --identifier-names-generator hexadecimal \
          --rename-globals true \
          --transform-object-keys true

      - name: Commit and Push
        if: steps.check_update.outputs.UPDATE_NEEDED == 'true' || github.event_name == 'workflow_dispatch'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: main
          commit_message: '🤖 Auto obfuscate'
          file_pattern: '_worker.js' 
          
      - name: update sha
        if: steps.check_update.outputs.UPDATE_NEEDED == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          echo "${{ steps.check_update.outputs.NEW_SHA }}" > .sync_sha
          git add .sync_sha _worker.js
          git commit -m "chore: sync worker from ${{ env.REPO }}@${{ steps.check_update.outputs.NEW_SHA }}"
          git push origin main
